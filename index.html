<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nueva Paz FC - Elite Management</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --primary: #002347; --accent: #28a745; --gold: #ffc107;
            --danger: #dc3545; --bg: #f0f2f5; --card: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: #1a1a1a; overflow-x: hidden; }
        
        /* LOGIN ESTILO APP */
        #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--primary) 0%, #00152b 100%); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .login-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); padding: 40px 30px; border-radius: 30px; width: 100%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        .login-card h1 { color: white; margin: 0 0 10px; font-size: 24px; letter-spacing: 2px; }
        .login-card p { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 30px; }
        
        /* APP LAYOUT */
        #main-app { display: none; padding-bottom: 80px; }
        header { background: var(--primary); color: white; padding: 30px 20px; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); }
        
        .nav-bar { background: white; display: flex; justify-content: space-around; position: fixed; bottom: 0; width: 100%; height: 70px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 999; }
        .nav-item { flex: 1; border: none; background: none; color: #999; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: 0.3s; }
        .nav-item.active { color: var(--primary); border-top: 3px solid var(--primary); background: #f8faff; }

        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .section { display: none; animation: fadeIn 0.3s ease-out; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* WIDGETS Y CARDS */
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.03); }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #f8faff; padding: 20px; border-radius: 18px; text-align: center; border: 1px solid #edf2f7; }
        .stat-box span { display: block; font-size: 11px; color: #718096; text-transform: uppercase; font-weight: bold; }
        .stat-box b { font-size: 22px; color: var(--primary); }

        /* TABLA PREMIUM */
        .table-container { overflow-x: auto; border-radius: 15px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 750px; background: white; }
        th { background: #f1f5f9; color: #475569; padding: 15px; font-size: 12px; text-align: center; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; text-align: center; font-size: 14px; }
        .atleta-info { text-align: left; min-width: 180px; }
        .atleta-info b { display: block; color: var(--primary); }
        .atleta-info small { color: #94a3b8; }

        /* INPUTS Y BOTONES */
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 15px; margin-bottom: 12px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }
        .btn { padding: 14px 24px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-main { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(40,167,69,0.2); }
        .btn-sec { background: var(--primary); color: white; }
        .btn-outline { background: #fff; border: 1px solid #cbd5e0; color: #4a5568; padding: 8px; font-size: 12px; }

        .tag-deuda { background: #fff5f5; color: #c53030; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .tag-ok { background: #f0fff4; color: #2f855a; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h1>NUEVA PAZ FC</h1>
        <p>Gesti&oacute;n de Alto Rendimiento</p>
        <input type="password" id="pass-field" placeholder="Contrase&ntilde;a" style="text-align:center;">
        <button onclick="iniciarSesion()" class="btn btn-main" style="margin-top:10px;">ACCEDER AL PANEL</button>
    </div>
</div>

<div id="main-app">
    <header>
        <h2 style="margin:0; font-size: 20px;">ACADEMIA NUEVA PAZ</h2>
        <div id="db-status" style="font-size:11px; margin-top:5px; opacity:0.8;">Sincronizando...</div>
    </header>

    <div class="container">
        <div id="sec-finanzas" class="section active">
            <div class="card" style="background: var(--primary); color: white;">
                <span style="font-size:12px; opacity:0.7;">RECAUDACI&Oacute;N TOTAL SEMANA</span>
                <h1 id="view-caja-total" style="margin:10px 0; font-size: 38px;">Bs. 0,00</h1>
                <div style="display:flex; justify-content:space-between; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px; margin-top:10px;">
                    <div style="text-align:center; flex:1;">
                        <small style="opacity:0.7; font-size:10px; display:block;">MIGUEL</small>
                        <b id="view-miguel" style="font-size:16px;">Bs. 0</b>
                    </div>
                    <div style="border-left:1px solid rgba(255,255,255,0.1); padding:0 15px;"></div>
                    <div style="text-align:center; flex:1;">
                        <small style="opacity:0.7; font-size:10px; display:block;">EDUARDO</small>
                        <b id="view-eduardo" style="font-size:16px;">Bs. 0</b>
                    </div>
                </div>
            </div>

            <div class="card" style="border-left: 6px solid var(--gold);">
                <h4 style="margin:0 0 10px; color: #718096; font-size:13px;">AJUSTE DE CUENTAS</h4>
                <div id="msg-reparto" style="font-weight:bold; color:var(--primary); font-size:15px; line-height:1.4;">Cargando balances...</div>
                <button onclick="limpiarCaja()" class="btn btn-outline" style="margin-top:15px; width:auto; padding:8px 20px;">Reiniciar Caja</button>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0; font-size:16px;">Asistencia y Cobros</h3>
                    <select id="filtro-cat" onchange="actualizarInterfaz()" style="width:140px; margin:0; padding:8px;">
                        <option value="Todas">Todas</option>
                        <option>Sub 10</option><option>Sub 12</option>
                        <option>Sub 14</option><option>Sub 16</option><option>Sub 18</option>
                    </select>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="text-align:left">Atleta</th>
                                <th>S1</th><th>S2</th><th>S3</th><th>S4</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="lista-pagos"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="sec-nomina" class="section">
            <div class="card">
                <h3>Nuevo Ingreso</h3>
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <input type="date" id="reg-fecha">
                <button onclick="agregarAtleta()" class="btn btn-main">REGISTRAR EN NUBE</button>
            </div>

            <div class="card">
                <h3>Listado de Atletas</h3>
                <div class="table-container">
                    <table style="min-width: 100%;">
                        <thead><tr><th style="text-align:left">Nombre</th><th>Cat.</th><th>Acci&oacute;n</th></tr></thead>
                        <tbody id="lista-db"></tbody>
                    </table>
                </div>
            </div>

            <div class="card" style="background:#f8faff;">
                <h4>Mantenimiento</h4>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button onclick="descargarBackup()" class="btn btn-outline">📥 Respaldar</button>
                    <button onclick="document.getElementById('file-subir').click()" class="btn btn-outline">📤 Restaurar</button>
                    <input type="file" id="file-subir" style="display:none" onchange="restaurarBackup(event)">
                </div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="cambiarTab('sec-finanzas', this)">
            <span style="font-size:20px;">📊</span> Finanzas
        </button>
        <button class="nav-item" onclick="cambiarTab('sec-nomina', this)">
            <span style="font-size:20px;">👥</span> N&oacute;mina
        </button>
    </nav>
</div>

<script>
// CONFIGURACION
const config = {
    apiKey: "AIzaSyAdNo6jacd1KJLEpP7OJYbAPEwVgT-lnXw",
    authDomain: "nuevapazfc-df8f5.firebaseapp.com",
    databaseURL: "https://nuevapazfc-df8f5-default-rtdb.firebaseio.com",
    projectId: "nuevapazfc-df8f5",
    storageBucket: "nuevapazfc-df8f5.appspot.com",
    messagingSenderId: "198065310289",
    appId: "1:198065310289:web:7dc3e820ea83362fc38670"
};

let dbRef;
let appData = { atletas: [], caja: { miguel: 0, eduardo: 0 } };

function iniciarSesion() {
    const pass = document.getElementById('pass-field').value;
    if(pass === "NuevaPaz2026") {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        conectarFirebase();
    } else { alert("Acceso Incorrecto"); }
}

function conectarFirebase() {
    if (!firebase.apps.length) { firebase.initializeApp(config); }
    dbRef = firebase.database().ref('v9_pro_cloud');
    
    dbRef.on('value', (snap) => {
        const val = snap.val();
        if(val) { 
            appData = val; 
            if(!appData.caja) appData.caja = { miguel: 0, eduardo: 0 };
        }
        actualizarInterfaz();
        document.getElementById('db-status').innerText = "✅ Sincronizado";
    });
}

function subir() {
    if(dbRef) {
        document.getElementById('db-status').innerText = "⏳ Guardando...";
        dbRef.set(appData);
    }
}

function cambiarTab(id, el) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}

function agregarAtleta() {
    const nom = document.getElementById('reg-nombre').value.toUpperCase();
    const fec = document.getElementById('reg-fecha').value;
    if(!nom || !fec) return alert("Completa los datos");
    
    const edad = 2026 - new Date(fec).getFullYear();
    let cat = "Sub 18";
    if(edad <= 10) cat = "Sub 10"; else if(edad <= 12) cat = "Sub 12"; else if(edad <= 14) cat = "Sub 14"; else if(edad <= 16) cat = "Sub 16";

    if(!appData.atletas) appData.atletas = [];
    appData.atletas.push({
        id: Date.now(), nombre: nom, fecha: fec, categoria: cat,
        semanas: Array(4).fill().map(() => ({ asis: [false, false], pagado: false, monto: 0, receptor: "" }))
    });
    subir();
    document.getElementById('reg-nombre').value = '';
}

function actualizarInterfaz() {
    const filtro = document.getElementById('filtro-cat').value;
    const tPagos = document.getElementById('lista-pagos');
    const tDb = document.getElementById('lista-db');
    tPagos.innerHTML = ''; tDb.innerHTML = '';

    if(appData.atletas) {
        appData.atletas.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(atleta => {
            // Render Lista de Atletas (Nómina)
            tDb.innerHTML += `<tr>
                <td style="text-align:left"><b>${atleta.nombre}</b></td>
                <td>${atleta.categoria}</td>
                <td><button onclick="eliminarAtleta(${atleta.id})" style="color:red; background:none; border:none; font-size:16px;">✖</button></td>
            </tr>`;

            // Render Control de Pagos
            if(filtro === 'Todas' || atleta.categoria === filtro) {
                let sHtml = ''; let debe = false;
                atleta.semanas.forEach((s, idx) => {
                    const asis = s.asis[0] || s.asis[1];
                    if(asis && !s.pagado) debe = true;
                    sHtml += `<td style="background:${asis && !s.pagado ? '#fff5f5' : 'none'}">
                        <div style="display:flex; justify-content:center; gap:4px; margin-bottom:5px;">
                            <input type="checkbox" ${s.asis[0]?'checked':''} onclick="checkAsis(${atleta.id},${idx},0)" style="width:16px; height:16px; margin:0;">
                            <input type="checkbox" ${s.asis[1]?'checked':''} onclick="checkAsis(${atleta.id},${idx},1)" style="width:16px; height:16px; margin:0;">
                        </div>
                        ${s.pagado ? `<span style="font-size:10px; font-weight:bold; color:green;">Bs.${s.monto}</span>` : 
                        (asis ? `<button onclick="cobrar(${atleta.id},${idx})" style="font-size:9px; background:var(--accent); color:white; border:none; padding:3px 6px; border-radius:4px;">COBRAR</button>` : '')}
                    </td>`;
                });
                tPagos.innerHTML += `<tr>
                    <td class="atleta-info"><b>${atleta.nombre}</b><small>${atleta.categoria}</small></td>
                    ${sHtml}
                    <td>${debe ? '<span class="tag-deuda">DEUDA</span>' : '<span class="tag-ok">OK</span>'}</td>
                </tr>`;
            }
        });
    }

    // Actualizar Caja y Balance
    const m = appData.caja.miguel || 0;
    const e = appData.caja.eduardo || 0;
    const tot = m + e;
    document.getElementById('view-caja-total').innerText = `Bs. ${tot.toLocaleString('es-VE')}`;
    document.getElementById('view-miguel').innerText = `Bs. ${m.toLocaleString('es-VE')}`;
    document.getElementById('view-eduardo').innerText = `Bs. ${e.toLocaleString('es-VE')}`;
    
    const balanceMsg = document.getElementById('msg-reparto');
    const mitad = tot / 2;
    if(m > mitad) balanceMsg.innerHTML = `⚠️ <span style="color:var(--danger)">Miguel</span> debe entregar <b>Bs. ${(m-mitad).toFixed(2)}</b> a Eduardo para cuadrar el 50/50.`;
    else if(e > mitad) balanceMsg.innerHTML = `⚠️ <span style="color:var(--danger)">Eduardo</span> debe entregar <b>Bs. ${(e-mitad).toFixed(2)}</b> a Miguel para cuadrar el 50/50.`;
    else balanceMsg.innerHTML = `✅ ¡Cuentas cuadradas! Ambos tienen el monto exacto.`;
}

function checkAsis(id, sIdx, dIdx) {
    const i = appData.atletas.findIndex(x => x.id === id);
    appData.atletas[i].semanas[sIdx].asis[dIdx] = !appData.atletas[i].semanas[sIdx].asis[dIdx];
    subir();
}

function cobrar(id, sIdx) {
    const monto = parseFloat(prompt("Monto recaudado (Bs):"));
    if(isNaN(monto)) return;
    const resp = prompt("¿Quién recibió el dinero?\n1: Miguel | 2: Eduardo");
    if(resp !== '1' && resp !== '2') return;

    const i = appData.atletas.findIndex(x => x.id === id);
    appData.atletas[i].semanas[sIdx].pagado = true;
    appData.atletas[i].semanas[sIdx].monto = monto;
    appData.atletas[i].semanas[sIdx].receptor = resp;

    if(resp === '1') appData.caja.miguel += monto; else appData.caja.eduardo += monto;
    subir();
}

function eliminarAtleta(id) { if(confirm("¿Eliminar este registro?")) { appData.atletas = appData.atletas.filter(x => x.id !== id); subir(); } }
function limpiarCaja() { if(confirm("¿Reiniciar la caja semanal a cero?")) { appData.caja = { miguel: 0, eduardo: 0 }; subir(); } }

function descargarBackup() {
    const blob = new Blob([JSON.stringify(appData)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `Backup_NuevaPaz_${new Date().toLocaleDateString()}.json`; a.click();
}

function restaurarBackup(e) {
    const reader = new FileReader();
    reader.onload = (event) => {
        try {
            appData = JSON.parse(event.target.result);
            subir(); alert("✅ Sistema Restaurado");
        } catch(e) { alert("❌ Error en archivo"); }
    };
    reader.readAsText(e.target.files[0]);
}
</script>
</body>
</html>
